name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-if-missing:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          TITLE="$TAG"

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "title=$TITLE"
          } >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists for ${{ steps.meta.outputs.tag }}."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release does not exist for ${{ steps.meta.outputs.tag }}. Creating one."
          fi

      - name: Check if package version changed
        id: version_guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: bypassing version-change guard."
            exit 0
          fi

          if [ "${{ steps.check_release.outputs.exists }}" = "false" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No release exists for ${{ steps.meta.outputs.tag }}; allowing release."
            exit 0
          fi

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIOUS_VERSION=$(git show HEAD^:package.json 2>/dev/null | node -e "let raw=''; process.stdin.on('data', (chunk) => raw += chunk); process.stdin.on('end', () => { try { const parsed = JSON.parse(raw); console.log(parsed.version ?? ''); } catch { console.log(''); } });")

          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "No previous package.json version found; allowing release."
          elif [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "package.json version unchanged ($CURRENT_VERSION); skipping release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "package.json version changed: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          fi

      - name: Install dependencies
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: bun install --frozen-lockfile

      - name: Type check
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: bunx tsc --noEmit

      - name: Format check
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: bunx prettier --check "**/*.{ts,json,md}"

      - name: Unit tests
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: bun run test

      - name: Build
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: bun run build

      - name: Smoke test
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        run: node dist/index.js --help

      - name: Ensure git tag exists
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists locally."
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${{ steps.meta.outputs.tag }}" | grep -q "refs/tags/${{ steps.meta.outputs.tag }}"; then
            echo "Tag already exists on origin. Fetching it locally."
            git fetch origin "refs/tags/${{ steps.meta.outputs.tag }}:refs/tags/${{ steps.meta.outputs.tag }}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}" "${{ github.event.workflow_run.head_sha || github.sha }}"
          git push origin "refs/tags/${{ steps.meta.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version_guard.outputs.changed == 'true' && steps.check_release.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.event.workflow_run.head_sha || github.sha }}" \
            --verify-tag \
            --title "${{ steps.meta.outputs.title }}" \
            --notes ""
